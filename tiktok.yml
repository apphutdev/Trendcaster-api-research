paths:
  tiktok_tasks_list:
    get:
      summary: List of the created tasks
      tags:
        - Tiktok auto-update tasks
      parameters:
        - name: item_type
          in: path
          description: >
            Type of the target item
          required: true
          schema:
            type: string
            enum:
              - post
              - profile
              - search/post
              - search/profile
              - search/hashtag
              - search/music
        - name: task_type
          in: query
          description: >
            Select what tasks to retrieve.

             - "update" - simple queued task for updating an item once.
             - "auto_update" - tasks for monitoring items for some time.
          schema:
            type: string
            enum:
              - "update"
              - "auto_update"
            default: "update"
        - $ref: "commons.yml#/components/parameters/PaginationCursor"
        - $ref: "commons.yml#/components/parameters/PaginationMaxPageSize"
      responses:
        "200":
          description: Successful request
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - status
                properties:
                  data:
                    type: object
                    required:
                      - items
                      - page_info
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "commons.yml#/components/schemas/TaskInfo"
                      page_info:
                        $ref: "commons.yml#/components/schemas/PageInfo"
                  error:
                    enum:
                      - null
                  status:
                    type: string
                    enum:
                      - ok
        "400":
          $ref: "commons.yml#/components/responses/InvalidRequest"
        "403":
          $ref: "commons.yml#/components/responses/Unauthorized"
        "429":
          $ref: "commons.yml#/components/responses/RateLimitExceeded"
        "503":
          $ref: "commons.yml#/components/responses/InternalError"

  tiktok_task:
    delete:
      summary: Cancel created task
      tags:
        - Tiktok auto-update tasks
      parameters:
        - name: item_type
          in: path
          description: >
            Type of the target item
          required: true
          schema:
            type: string
            enum:
              - post
              - profile
              - search/post
              - search/profile
              - search/hashtag
              - search/music
        - $ref: "commons.yml#/components/parameters/TaskId"
      responses:
        "200":
          $ref: "commons.yml#/components/responses/TaskCanceled"
        "400":
          $ref: "commons.yml#/components/responses/InvalidRequest"
        "403":
          $ref: "commons.yml#/components/responses/Unauthorized"
        "429":
          $ref: "commons.yml#/components/responses/RateLimitExceeded"
        "503":
          $ref: "commons.yml#/components/responses/InternalError"

  tiktok_post_update:
    post:
      summary: Post update task
      tags:
        - Tiktok post
      parameters:
        - $ref: "#/components/parameters/TiktokProfileID"
        - name: section
          in: path
          description: Section of a profile
          required: true
          schema:
            type: string
            enum:
              - feed
        - $ref: "#/components/parameters/TiktokPostID"
        - name: load_comments
          in: query
          description: >
            Enable or disable fetching of comments for the post.
          schema:
            default: false
            type: boolean
        - name: max_comments
          in: query
          description: >
            Set limit for the number of comments that will be fetched for the post.

             - Values < 25 will drastically increase the update process performance.
          schema:
            default: 100
            minimum: 1
            type: integer
        - name: load_replies
          in: query
          description: >
            Enable or disable fetching of replies for the comments.
          schema:
            default: false
            type: boolean
        - name: upload_video_cover_url_s3
          in: query
          description: >
            Upload video cover image to external data storage.


            +1 credit per image.
          schema:
            default: false
            type: boolean
        - $ref: "commons.yml#/components/parameters/CallbackURI"
        - $ref: "commons.yml#/components/parameters/AutoUpdateInterval"
        - $ref: "commons.yml#/components/parameters/AutoUpdateExpireAt"
      responses:
        "202":
          $ref: "commons.yml#/components/responses/TaskCreated"
        "400":
          $ref: "commons.yml#/components/responses/InvalidRequest"
        "403":
          $ref: "commons.yml#/components/responses/Unauthorized"
        "429":
          $ref: "commons.yml#/components/responses/RateLimitExceeded"
        "503":
          $ref: "commons.yml#/components/responses/InternalError"
    get:
      summary: Status of the post task
      tags:
        - Tiktok post
      parameters:
        - $ref: "#/components/parameters/TiktokProfileID"
        - name: section
          in: path
          description: Section of a profile
          required: true
          schema:
            type: string
            enum:
              - feed
        - $ref: "#/components/parameters/TiktokPostID"
      responses:
        "200":
          $ref: "commons.yml#/components/responses/TaskInfo"
