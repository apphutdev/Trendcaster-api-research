  tiktok_stats:
    get:
      summary: API usage stats
      tags:
        - Tiktok API credits usage
      parameters:
        - name: from_date
          in: query
          description: >
            Calculate usage from this date.

             - Timestamp value must be in ISO 8601 format (2007-04-06).
          schema:
            default: Beginning of the current month
            type: string
            format: date
          example: "2021-02-12"
        - name: to_date
          in: query
          description: >
            Calculate usage to this date.

             - Timestamp value must be in ISO 8601 format (2007-04-06).
          schema:
            default: Today
            type: string
            format: date
          example: "2021-04-21"
      responses:
        "200":
          description: Successful request
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - status
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - task_type
                        - mentions_count
                        - tasks_count
                      properties:
                        task_type:
                          type: string
                          enum:
                            - post
                            - profile
                            - profile_with_posts
                            - search_for_posts_by_hashtag
                            - search_for_posts_by_music
                            - search_for_profiles
                        mentions_count:
                          type: integer
                        tasks_count:
                          type: integer
                  error:
                    enum:
                      - null
                  status:
                    type: string
                    enum:
                      - ok
        "400":
          $ref: "commons.yml#/components/responses/InvalidRequest"
        "403":
          $ref: "commons.yml#/components/responses/Unauthorized"
        "429":
          $ref: "commons.yml#/components/responses/RateLimitExceeded"
        "503":
          $ref: "commons.yml#/components/responses/InternalError"

