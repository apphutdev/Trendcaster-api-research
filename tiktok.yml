  parameters:
    TiktokPostID:
      name: post_id
      in: path
      description: >
        Internal Tiktok ID of the target post or shortcode from mobile app.
      required: true
      schema:
        $ref: "#/components/schemas/TiktokPostID"

    TiktokCommentID:
      name: comment_id
      in: path
      description: >
        Internal Tiktok ID of the target comment.
      required: true
      schema:
        $ref: "#/components/schemas/TiktokCommentID"

    TiktokProfileID:
      name: profile_id
      in: path
      description: >
        Internal Tiktok ID or username of the target profile without the @ prefix.
      required: true
      schema:
        oneOf:
          - $ref: "#/components/schemas/TiktokProfileID"
          - $ref: "#/components/schemas/TiktokProfileUsername"

    TiktokHashtagID:
      name: hashtag_id
      in: path
      description: >
        Hashtag without the # prefix.
      required: true
      schema:
        $ref: "#/components/schemas/TiktokHashtagID"

    TiktokMusicID:
      name: music_id
      in: path
      description: >
        Internal Tiktok ID of the target music.
      required: true
      schema:
        $ref: "#/components/schemas/TiktokMusicID"

    TiktokMusicTitle:
      name: music_title
      in: path
      description: >
        Internal Tiktok title of the target music.
      required: true
