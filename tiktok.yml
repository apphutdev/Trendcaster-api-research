components:
  schemas:
    TiktokPostID:
      type: string
      format: int64 or str
      example: "6984742325058604289"

    TiktokCommentID:
      type: string
      format: int64
      example: "17853906569406547"

    TiktokProfileID:
      type: string
      format: int64
      example: "6768298772725744642"

    TiktokPostIDInt64:
      type: integer
      format: int64
      example: 6984742325058604

    TiktokProfileIDInt64:
      type: integer
      format: int64
      example: 6768298772725744

    TiktokProfileUsername:
      type: string
      example: "sssorn_chonnasorn"

    TiktokProfileFullName:
      type: string
      example: "Sssorn Chonnasorn"

    TiktokHashtagID:
      type: string
      example: "hellokitty"

    TiktokMusicID:
      type: string
      format: int64
      example: "6770164452730915590"

    TiktokMusicTitle:
      type: string
      example: "I Get So Weak"

    TiktokChallenge:
      type: object
      properties:
        id:
          type: string
          format: int64
        title:
          type: string
        description:
          nullable: true
          type: string
        profile_url:
          nullable: true
          type: string
          format: uri
        cover_url:
          nullable: true
          type: string
          format: uri
        is_commerce:
          type: boolean

    TiktokDuet:
      type: object
      properties:
        from_id:
          $ref: "#/components/schemas/TiktokProfileID"

    TiktokEffectSticker:
      type: object
      properties:
        id:
          type: string
          format: int64
        name:
          type: string

    TiktokMusic:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/TiktokMusicID"
        title:
          type: string
        album:
          nullable: true
          type: string
        author:
          type: string
        is_original:
          type: boolean
        play_url:
          type: string
          format: uri
        cover_url:
          type: string
          format: uri
        duration:
          type: integer
          format: seconds

    TiktokVideo:
      type: object
      properties:
        id:
          type: string
          format: int64
        height:
          type: integer
        width:
          type: integer
        duration:
          type: integer
          format: seconds
        ratio:
          type: string
        bitrate:
          type: integer
        format:
          type: string
        quality:
          type: string
        cover_url:
          type: string
          format: uri
        origin_cover_url:
          type: string
          format: uri
        dynamic_cover_url:
          type: string
          format: uri
        play_url:
          type: string
          format: uri
        request:
          type: string
          description: >
            The request field contains a cURL command for fetching video from TikTok,
            incorporating necessary parameters and authentication details.

    TiktokProfileMini:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/TiktokProfileID"
        username:
          $ref: "#/components/schemas/TiktokProfileUsername"
        full_name:
          $ref: "#/components/schemas/TiktokProfileFullName"

    TiktokSticker:
      type: object
      properties:
        type:
          type: integer
        text:
          nullable: true
          type: array
          items:
            type: string

    TiktokProfile:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/TiktokProfileID"
        username:
          $ref: "#/components/schemas/TiktokProfileUsername"
        full_name:
          $ref: "#/components/schemas/TiktokProfileFullName"
        username_modify_time:
          nullable: true
          type: string
          format: date-time
        full_name_modify_time:
          nullable: true
          type: string
          format: date-time
        created_time:
          nullable: true
          type: string
          format: date-time
        avatar_url:
          type: string
          format: uri
        signature:
          nullable: true
          type: string
        biography_link:
          nullable: true
          type: string
          format: uri
        region:
          nullable: true
          type: string
        langs:
          nullable: true
          type: array
          items:
            type: string
        is_verified:
          nullable: true
          type: boolean
        is_private:
          nullable: true
          type: boolean
        follower_count:
          type: integer
        following_count:
          type: integer
        friend_count:
          type: integer
        heart_count:
          type: integer
        video_count:
          type: integer
        digg_count:
          type: integer
        profile_avatar_url:
          nullable: true
          type: string
          format: uri
          example: "https://data365media.blob.core.windows.net/dev-media/tiktok/profiles/7010140047022769153/a98de66aaa520b962ffde155b9c4d16a.jpeg"
        profile_screenshot_url:
          type: string
          format: uri
          example: "https://data365media.blob.core.windows.net/dev-media/tiktok/profiles/6768298772725744642/page.png"

    TiktokPost:
      type: object
      properties:
        id:
          $ref: "#/components/schemas/TiktokPostID"
        created_time:
          type: string
          format: date-time
        timestamp:
          nullable: true
          type: integer
          format: unix-timestamp
          example: 1566645322

        text:
          nullable: true
          type: string
        lang:
          nullable: true
          type: string
        mentioned_profiles:
          nullable: true
          type: array
          items:
            $ref: "#/components/schemas/TiktokProfileMini"
        hashtags:
          nullable: true
          type: array
          items:
            type: string
        images:
          nullable: true
          type: array
          items:
            type: string

        music:
          $ref: "#/components/schemas/TiktokMusic"
        video:
          $ref: "#/components/schemas/TiktokVideo"
        duet:
          nullable: true
          $ref: "#/components/schemas/TiktokDuet"
        challenges:
          nullable: true
          type: array
          items:
            $ref: "#/components/schemas/TiktokChallenge"
        effect_stickers:
          nullable: true
          type: array
          items:
            $ref: "#/components/schemas/TiktokEffectSticker"
        stickers:
