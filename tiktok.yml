    get:
      summary: Tiktok queue size for current user
      description: >
        The endpoint provides information about the queues associated with the current user and their respective lenghts.
        It allows users to retrieve the size of their queues, which can be useful for monitoring and managing queued items.
      tags:
        - Tiktok queues
      responses:
        "200":
          description: Successful request
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - status
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - name
                        - size
                        - max_size
                      properties:
                        name:
