  tiktok_profile_update:
    post:
      summary: Profile update task
      tags:
        - Tiktok profile
      parameters:
        - $ref: "#/components/parameters/TiktokProfileID"
        - $ref: "commons.yml#/components/parameters/PostFilterFromDate"
        - name: load_feed_posts
          in: query
          description: >
            Enable or disable fetching of posts from the feed section of the profile.


            +1 credit per post.
          schema:
            default: false
            type: boolean
        - name: max_posts
          in: query
          description: >
            Set limit for the number of posts that will be fetched for the profile.
          schema:
            default: 100
            minimum: 1
            type: integer
        - name: load_comments
          in: query
          description: >
            Enable or disable fetching of comments for the post.


            +5 (at least) credits per post.
          schema:
            default: false
            type: boolean
        - name: max_comments
          in: query
          description: >
            Set limit for the number of comments that will be fetched for the post.

             - Values < 25 will drastically increase the update process performance.
          schema:
            default: 100
            minimum: 1
            type: integer
        - name: load_replies
          in: query
          description: >
            Enable or disable fetching of replies for the comments.
          schema:
            default: false
            type: boolean
        - name: load_followers
          in: query
          description: >
            Enable or disable fetching of followers of the profile.

             +1 credit per follower.
          schema:
            default: false
            type: boolean
        - name: load_followers_data
          in: query
          description: >
            Fetch all fields of followers profiles.

            - This parameter can be enabled only if load_followers parameter is enabled.


            +9 credits per follower.
          schema:
            default: false
            type: boolean
        - name: max_followers
          in: query
          description: >
            Set a limit for the number of followers that will be fetched for the profile.
          schema:
            default: 100
            minimum: 1
            type: integer
          example: 50
        - name: load_following
          in: query
          description: >
            Enable or disable fetching of following of the profile.

             +1 credit per follower.
          schema:
            default: false
            type: boolean
        - name: load_following_data
          in: query
          description: >
            Fetch all fields of following profiles.

            - This parameter can be enabled only if load_following parameter is enabled.


            +9 credits per follower.
          schema:
            default: false
            type: boolean
        - name: max_following
          in: query
          description: >
            Set a limit for the number of following that will be fetched for the profile.
          schema:
            default: 100
            minimum: 1
            type: integer
          example: 50
        - name: page_screenshot
          in: query
          description: >
            Take full page screenshot.


            - +15 credits per profile.
          schema:
            default: false
            type: boolean
        - $ref: "commons.yml#/components/parameters/CallbackURI"
        - $ref: "commons.yml#/components/parameters/AutoUpdateInterval"
        - $ref: "commons.yml#/components/parameters/AutoUpdateExpireAt"
      responses:
        "202":
          $ref: "commons.yml#/components/responses/TaskCreated"
        "400":
          $ref: "commons.yml#/components/responses/InvalidRequest"
        "403":
          $ref: "commons.yml#/components/responses/Unauthorized"
        "429":
          $ref: "commons.yml#/components/responses/RateLimitExceeded"
        "503":
          $ref: "commons.yml#/components/responses/InternalError"
    get:
      summary: Status of the profile task
      tags:
        - Tiktok profile
      parameters:
        - $ref: "#/components/parameters/TiktokProfileID"
      responses:
        "200":
          $ref: "commons.yml#/components/responses/TaskInfo"
        "400":
